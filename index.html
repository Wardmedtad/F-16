<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <title>F-16 OWNDAYS</title>

  <!-- 🍏 ตั้งค่าให้เป็นเสมือน Native App บน iOS (iPad/iPhone) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="F-16 Hub">
  
  <!-- โลโก้แอปตอนกด Add to Home Screen -->
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2800/2800258.png">

  <style>
    body, html {
      margin: 0; 
      padding: 0; 
      width: 100%; 
      height: 100%; 
      overflow: hidden; 
      background-color: #f5f5f7;
    }
    /* ให้ Iframe แสดงผลเต็มจอ 100% ไม่มีขอบ */
    iframe {
      width: 100%; 
      height: 100%; 
      border: none; 
      display: block;
    }
  </style>
</head>
<body>

  <!-- 🖥️ กรอบที่จะดึงระบบของ Google Apps Script มาแสดง -->
  <iframe id="app-frame" allow="fullscreen"></iframe>

  <script>
    // 🔗 1. ลิงก์ Web App หน้าหลัก F-16 Hub ตัวจริง
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyVZp09oHsU62CZvJVBBeEnOLtQrW3t8Ngxe3IFG-T90_AhoM-0UixTUW3dgmBSRdI1/exec"; 

    // 🔍 2. ดักจับว่ามีการพิมพ์ ?branch=xxx ต่อท้ายลิงก์ GitHub หรือไม่
    const urlParams = new URLSearchParams(window.location.search);
    const branchCode = urlParams.get('branch');

    // 🚀 3. ประกอบลิงก์แล้วส่งให้ Iframe ทำงาน
    let finalUrl = GAS_URL;
    if (branchCode) {
      finalUrl += "?branch=" + branchCode;
    }

    // สั่งให้ Iframe โหลดหน้าเว็บ
    document.getElementById('app-frame').src = finalUrl;
  </script>

</body>
</html>
